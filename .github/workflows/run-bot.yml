name: Run Crypto Trading Bot
on:
  workflow_dispatch: # Button se chalanay ke liye
  schedule:
    - cron: '*/30 * * * *' # Har 30 mins baad automatic chalay ga

# Wallet file update karne ke liye permissions dena zaroori hai
permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Live Simulation Bot
        run: python bot.py

      # 🌟 GIT MEMORY FIX: Yeh step wallet.json ko permanent repository mein save kar dega
      - name: Save Wallet Progress
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add wallet.json || true
          git commit -m "🤖 Auto-Update: Wallet states and trade logs updated" || true
          git push || true
