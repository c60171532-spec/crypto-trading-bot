name: Run Crypto Trading Bot
on:
  workflow_dispatch: # Button se chalanay ke liye
  schedule:
    - cron: '*/30 * * * *' # Har 30 mins baad bot cloud par automatic chalay ga

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Live Simulation Bot
        run: python bot.py
